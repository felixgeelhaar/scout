version: 1
language: go
policy:
  default:
    min: 25
  domains:
    - name: middleware
      match:
        - ./middleware/...
      min: 30
    - name: cdp
      match:
        - ./internal/cdp/...
      min: 0
    - name: launcher
      match:
        - ./internal/launcher/...
      min: 0
    - name: wait
      match:
        - ./internal/wait/...
      min: 0
    - name: cmd
      match:
        - ./cmd/scout/...
      min: 0
    - name: agent
      match:
        - ./agent/...
      min: 0  # integration tests require Chrome; tested via go test ./... (no -short)
