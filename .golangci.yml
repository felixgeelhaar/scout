version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - bodyclose
    - nilerr
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      disable:
        - fieldalignment
        - shadow

formatters:
  enable:
    - gofmt
    - goimports
